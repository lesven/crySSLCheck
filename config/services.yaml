# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

parameters:
    app.scan_timeout: '%env(int:SCAN_TIMEOUT)%'
    app.retry_delay: '%env(int:RETRY_DELAY)%'
    app.retry_count: '%env(int:RETRY_COUNT)%'
    app.notify_on_unreachable: '%env(bool:NOTIFY_ON_UNREACHABLE)%'
    app.min_rsa_key_bits: '%env(int:MIN_RSA_KEY_BITS)%'
    app.scan_concurrency: '%env(int:SCAN_CONCURRENCY)%'
    app.allow_ip_addresses: '%env(bool:ALLOW_IP_ADDRESSES)%'
    app.domains_per_page: '%env(int:DOMAINS_PER_PAGE)%'
    app.mailer_from_email: '%env(MAILER_FROM_EMAIL)%'
    app.mailer_from_name: '%env(MAILER_FROM_NAME)%'
    app.alert_recipients: '%env(csv:ALERT_RECIPIENTS)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\ValueObject\ScanConfiguration:
        arguments:
            $scanTimeout: '%app.scan_timeout%'
            $retryDelay: '%app.retry_delay%'
            $retryCount: '%app.retry_count%'
            $notifyOnUnreachable: '%app.notify_on_unreachable%'
            $minRsaKeyBits: '%app.min_rsa_key_bits%'
            $scanConcurrency: '%app.scan_concurrency%'

    App\Service\ScanService:
        arguments:
            $config: '@App\ValueObject\ScanConfiguration'
            $parallelScanner: '@App\Service\ParallelScanner'

    App\Service\FindingPersister:
        arguments:
            $config: '@App\ValueObject\ScanConfiguration'

    App\Service\ParallelScanner:
        arguments:
            $config: '@App\ValueObject\ScanConfiguration'
            $projectDir: '%kernel.project_dir%'

    App\Service\TlsConnectorInterface:
        alias: App\Service\TlsConnector

    App\Service\MailService:
        public: true
        arguments:
            $fromEmail: '%app.mailer_from_email%'
            $fromName: '%app.mailer_from_name%'
            $alertRecipients: '%app.alert_recipients%'

    App\Controller\DomainController:
        arguments:
            $domainsPerPage: '%app.domains_per_page%'

    App\Service\ValidationService:
        arguments:
            $allowIpAddresses: '%app.allow_ip_addresses%'

    App\DataCollector\MailDataCollector:
        arguments:
            $requestStack: '@request_stack'
        tags:
            - { name: data_collector, id: mailer, template: 'mail_collector.html.twig' }

when@e2e:
    services:
        # Decorate the concrete CSRF manager so that all three injection points
        # (Twig csrf_token(), AbstractController::isCsrfTokenValid() via
        # security.csrf.token_manager, and the form_login listener) use the
        # no-op implementation. security.csrf.token_manager is an alias that
        # resolves to security.csrf.same_origin_token_manager, so we decorate
        # the concrete service.
        App\Security\NullCsrfTokenManager:
            decorates: security.csrf.same_origin_token_manager

        Symfony\Component\Security\Csrf\CsrfTokenManagerInterface:
            alias: App\Security\NullCsrfTokenManager
            public: true
