services:
  tls-monitor:
    build: .
    container_name: tls-monitor
    ports:
      - "8443:80"
    volumes:
      # bind the project directory into the container for fast development
      - ./:/var/www/html:delegated
      - tls-vendor:/var/www/html/vendor
      - tls-data:/var/www/html/data
      - tls-logs:/var/www/html/var/log
    # Ladereihenfolge: .env (Basis) → .env.dev (Dev-spezifisch) → .env.local (lokale Overrides, höchste Priorität)
    # Alle Dateien sind optional – fehlende Dateien werden stillschweigend ignoriert.
    env_file:
      - path: .env
        required: false
      - path: .env.dev
        required: false
      - path: .env.local
        required: false
    environment:
      # Feste Werte – werden nicht durch env_file überschrieben
      - TZ=Europe/Berlin
      - APP_ENV=dev
      - APP_DEBUG=1
      # Absoluter Pfad im Container überschreibt den relativen %kernel.project_dir%-Pfad aus env_file
      - DATABASE_URL=sqlite:////var/www/html/data/tls_monitor.sqlite
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  tls-vendor:
  tls-data:
  tls-logs:
